services:
  shop-bot:
    build: .
    restart: unless-stopped
    volumes:
      - ./config:/app/config:ro        # config.toml (read-only)
      - ./data/shop:/app/data/shop     # SQLite database (persistent)

  shop-web:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "web"]
    ports:
      - "127.0.0.1:8080:8080"          # only reachable locally; nginx proxies externally
    volumes:
      - ./config:/app/config:ro        # config.toml (read-only)
      - ./data/shop:/app/data/shop     # same SQLite database as the bot
    environment:
      # Both secrets are required.  Keep them in a .env file alongside this
      # compose file (gitignored) instead of in config.toml.
      #
      # WEB_SECRET_KEY signs the session cookie — generate once with:
      #   python -c 'import secrets; print(secrets.token_urlsafe(48))'
      # Changing it invalidates all existing sessions.
      - WEB_PASSWORD=${WEB_PASSWORD:-}
      - WEB_SECRET_KEY=${WEB_SECRET_KEY:-}
