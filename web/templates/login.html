<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Einkaufsliste — Anmeldung</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    form {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1.5rem;
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }
    h1 { font-size: 1.25rem; }
    input[type="password"] {
      padding: .5rem .75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    button {
      padding: .6rem 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .error { color: #ef4444; font-size: .9rem; }
  </style>
</head>
<body>
  <form method="post" action="{{ url_for('login_submit') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" autocomplete="on">
    <h1>Einkaufsliste</h1>
    <input type="password" name="password" placeholder="Passwort" autofocus required>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <button type="submit">Anmelden</button>
  </form>
</body>
</html>
