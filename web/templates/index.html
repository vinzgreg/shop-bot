<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Einkaufsliste</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    h1 { font-size: 1.5rem; margin-bottom: 1.25rem; }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .header h1 { margin-bottom: 0; }
    .logout-form button {
      background: none;
      border: none;
      color: #6b7280;
      font-size: .85rem;
      cursor: pointer;
      padding: 0;
    }
    .logout-form button:hover { color: #1a1a1a; text-decoration: underline; }

    /* Add form — two-row layout on mobile, one row on wider screens */
    #add-form {
      display: grid;
      grid-template-columns: 1fr 7rem;
      grid-template-rows: auto auto;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }
    #new-name {
      grid-column: 1;
      grid-row: 1;
    }
    #new-qty {
      grid-column: 2;
      grid-row: 1;
    }
    #add-btn {
      grid-column: 1 / -1;  /* full width on its own row */
      grid-row: 2;
    }
    @media (min-width: 480px) {
      #add-form {
        grid-template-columns: 1fr 7rem auto;
        grid-template-rows: auto;
      }
      #add-btn {
        grid-column: 3;
        grid-row: 1;
      }
    }

    #add-form input {
      padding: .5rem .75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      width: 100%;
    }
    #add-form button {
      padding: .6rem 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #add-form button:hover { background: #1d4ed8; }

    /* List */
    #list { list-style: none; }

    #list li {
      display: flex;
      align-items: center;
      gap: .75rem;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: .65rem 1rem;
      margin-bottom: .5rem;
      transition: opacity .2s;
    }
    #list li.done { opacity: .4; text-decoration: line-through; }

    #list li .name { flex: 1; font-size: 1rem; }

    #list li .qty-wrap {
      display: flex;
      align-items: center;
      gap: .25rem;
    }
    .qty-btn {
      width: 1.75rem; height: 1.75rem;
      border: 1px solid #ccc;
      background: #f9fafb;
      border-radius: 4px;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
    }
    .qty-btn:hover { background: #e5e7eb; }
    .qty-display { min-width: 2rem; text-align: center; font-size: .95rem; }

    .tick-btn {
      width: 1.75rem; height: 1.75rem;
      border: 1px solid #ccc;
      background: #f9fafb;
      border-radius: 50%;
      font-size: .9rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .tick-btn:hover { background: #dcfce7; border-color: #86efac; }

    .del-btn {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 .25rem;
    }
    .del-btn:hover { color: #ef4444; }

    #empty-msg { color: #6b7280; font-style: italic; }
    #error-msg { color: #ef4444; font-size: .9rem; margin-bottom: .75rem; min-height: 1.2em; }

    #undo-bar {
      margin-bottom: .75rem;
    }
    #undo-btn {
      padding: .4rem .9rem;
      background: none;
      border: 1px solid #9ca3af;
      border-radius: 6px;
      font-size: .9rem;
      color: #374151;
      cursor: pointer;
    }
    #undo-btn:hover { background: #f3f4f6; border-color: #6b7280; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Einkaufsliste</h1>
    <form class="logout-form" method="post" action="{{ url_for('logout') }}">
      <button type="submit">Abmelden</button>
    </form>
  </div>

  <form id="add-form" autocomplete="off">
    <input type="text" id="new-name" placeholder="Artikel" required>
    <input type="text" id="new-qty" placeholder="Menge (z.B. 2 kg)">
    <button type="submit" id="add-btn">Hinzufügen</button>
  </form>

  <div id="error-msg"></div>
  <div id="undo-bar" hidden><button id="undo-btn">↩ Rückgängig</button></div>
  <ul id="list"></ul>
  <p id="empty-msg" hidden>Die Einkaufsliste ist leer.</p>

  <script>
    const listEl   = document.getElementById('list');
    const emptyMsg = document.getElementById('empty-msg');
    const errorMsg = document.getElementById('error-msg');
    const undoBar  = document.getElementById('undo-bar');
    const undoBtn  = document.getElementById('undo-btn');

    let lastAction = null;

    function setUndo(action) {
      lastAction = action;
      undoBar.hidden = false;
    }

    function clearUndo() {
      lastAction = null;
      undoBar.hidden = true;
    }

    undoBtn.addEventListener('click', async () => {
      if (!lastAction) return;
      const action = lastAction;
      clearUndo();
      try {
        if (action.type === 'add') {
          await apiFetch(`/api/items/${action.id}`, { method: 'DELETE' });
        } else if (action.type === 'delete') {
          await apiFetch('/api/items', {
            method: 'POST',
            body: JSON.stringify({ name: action.item.name, quantity: action.item.quantity, unit: action.item.quantity_unit }),
          });
        } else if (action.type === 'qty_change') {
          await apiFetch(`/api/items/${action.id}`, {
            method: 'PATCH',
            body: JSON.stringify({ quantity: action.oldQty }),
          });
        }
        await loadList();
      } catch (e) {
        showError(e.message);
        setUndo(action);
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      setTimeout(() => { errorMsg.textContent = ''; }, 4000);
    }

    async function apiFetch(url, opts = {}) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...opts.headers },
        ...opts,
      });
      if (res.status === 401) {
        // Session expired — bounce to login
        window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
        throw new Error('Sitzung abgelaufen');
      }
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || res.statusText);
      }
      return res.status === 204 ? null : res.json();
    }

    // Parse "2 kg", "500", "3x", "1.5l" → { quantity, unit }
    function parseQty(raw) {
      const s = raw.trim();
      if (!s) return { quantity: null, unit: null };
      const m = s.match(/^(\d+)\s*(.*)$/);
      if (!m) return { quantity: null, unit: s || null };
      return {
        quantity: parseInt(m[1], 10),
        unit: m[2].trim() || null,
      };
    }

    function formatQty(item) {
      if (item.quantity == null) return '';
      return item.quantity_unit ? `${item.quantity} ${item.quantity_unit}` : String(item.quantity);
    }

    function renderItem(item) {
      const li = document.createElement('li');
      li.dataset.id = item.id;

      const nameSpan = document.createElement('span');
      nameSpan.className = 'name';
      nameSpan.textContent = item.name;

      const qtyWrap = document.createElement('span');
      qtyWrap.className = 'qty-wrap';

      if (item.quantity != null) {
        const minusBtn = document.createElement('button');
        minusBtn.className = 'qty-btn';
        minusBtn.textContent = '−';
        minusBtn.title = 'Menge verringern';

        const qtyDisplay = document.createElement('span');
        qtyDisplay.className = 'qty-display';
        qtyDisplay.textContent = formatQty(item);

        const plusBtn = document.createElement('button');
        plusBtn.className = 'qty-btn';
        plusBtn.textContent = '+';
        plusBtn.title = 'Menge erhöhen';

        minusBtn.addEventListener('click', async () => {
          const newQty = item.quantity - 1;
          if (newQty < 1) return;
          const oldQty = item.quantity;
          try {
            await apiFetch(`/api/items/${item.id}`, {
              method: 'PATCH',
              body: JSON.stringify({ quantity: newQty }),
            });
            setUndo({ type: 'qty_change', id: item.id, oldQty });
            item.quantity = newQty;
            qtyDisplay.textContent = formatQty(item);
          } catch (e) { showError(e.message); }
        });

        plusBtn.addEventListener('click', async () => {
          const newQty = item.quantity + 1;
          const oldQty = item.quantity;
          try {
            await apiFetch(`/api/items/${item.id}`, {
              method: 'PATCH',
              body: JSON.stringify({ quantity: newQty }),
            });
            setUndo({ type: 'qty_change', id: item.id, oldQty });
            item.quantity = newQty;
            qtyDisplay.textContent = formatQty(item);
          } catch (e) { showError(e.message); }
        });

        qtyWrap.append(minusBtn, qtyDisplay, plusBtn);
      }

      const tickBtn = document.createElement('button');
      tickBtn.className = 'tick-btn';
      tickBtn.title = 'Erledigt';
      tickBtn.textContent = '✓';
      tickBtn.addEventListener('click', async () => {
        try {
          await apiFetch(`/api/items/${item.id}`, { method: 'DELETE' });
          setUndo({ type: 'delete', item: { ...item } });
          li.remove();
          checkEmpty();
        } catch (e) { showError(e.message); }
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.title = 'Löschen';
      delBtn.textContent = '×';
      delBtn.addEventListener('click', async () => {
        try {
          await apiFetch(`/api/items/${item.id}`, { method: 'DELETE' });
          setUndo({ type: 'delete', item: { ...item } });
          li.remove();
          checkEmpty();
        } catch (e) { showError(e.message); }
      });

      li.append(nameSpan, qtyWrap, tickBtn, delBtn);
      return li;
    }

    function checkEmpty() {
      emptyMsg.hidden = listEl.children.length > 0;
    }

    async function loadList(preserveUndo = false) {
      try {
        const items = await apiFetch('/api/items');
        listEl.innerHTML = '';
        items.forEach(item => listEl.appendChild(renderItem(item)));
        checkEmpty();
        if (!preserveUndo) clearUndo();
      } catch (e) { showError('Laden fehlgeschlagen: ' + e.message); }
    }

    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('new-name').value.trim();
      const { quantity, unit } = parseQty(document.getElementById('new-qty').value);
      if (!name) return;
      try {
        const result = await apiFetch('/api/items', {
          method: 'POST',
          body: JSON.stringify({ name, quantity, unit }),
        });
        setUndo({ type: 'add', id: result.id });
        document.getElementById('new-name').value = '';
        document.getElementById('new-qty').value = '';
        await loadList(true);
      } catch (e) { showError(e.message); }
    });

    loadList();
  </script>
</body>
</html>
